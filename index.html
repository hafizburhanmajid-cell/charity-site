<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Charity Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="images/logo.jpg" alt="Charity logo">
            </div>
            <nav>
                <ul>
                    <li>About</li>
                    <li>Solutions</li>
                    <li>Causes</li>
                    <li>FAQ</li>
                    <li>Contact</li>
                </ul>
                <div class="nav-right">
                    <div class="search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <div class="buttons">
                        <button>Volunteer</button>
                        <button>Get in touch</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Lifting Lives with Love and Action</h1>
                <p>Empowering communities through compassion and hands-on support to create lasting change and uplift lives with love and action.</p>
                <button>Get Started <i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="hero-image">
                <div class="image-strip">
                    <img src="images/child2.png" alt="Child">
                </div>
                <div class="image-strip">
                    <img src="images/child3.png" alt="Child">
                </div>
                <div class="image-strip">
                    <img src="images/child4.png" alt="Child">
                </div>
                <div class="image-strip">
                    <img src="images/image.png" alt="Child">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
